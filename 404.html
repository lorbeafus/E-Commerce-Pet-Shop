<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>PetShop - Redirigiendo...</title>
    <script type="text/javascript">
      // Script to handle Single Page Application (SPA) routing on GitHub Pages
      // It takes the current URL and redirects it as a query parameter to index.html
      var pathSegmentsToKeep = 1; // Number of segments to keep (e.g., /E-Commerce-Pet-Shop/)

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
